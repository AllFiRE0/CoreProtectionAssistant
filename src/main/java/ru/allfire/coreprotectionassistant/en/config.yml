# MAIN configuration file of the plugin
# Everything is configured here: database, command tracking,
# violation weights, staff warnings, auto warn removal,
# grief detection, and much more
# ============================================

# ============================================
# DEBUG MODE
# ============================================
# true = detailed console logs (helps with configuration)
# false = complete silence, only critical errors
debug: false

# ============================================
# DATABASE
# ============================================
# The plugin stores all data in a database
# Supports SQLite (file) and MySQL (server)
# ============================================
database:
  # Database type: sqlite or mysql
  # sqlite - database.db file in the plugin folder (recommended for small servers)
  # mysql - separate MySQL server (for large servers and networks)
  type: "sqlite"
  # SQLite settings (used ONLY if type: sqlite)
  sqlite:
    # Connection timeout in milliseconds (30000 = 30 seconds)
    connection-timeout: 30000
    # Connection idle timeout in milliseconds (600000 = 10 minutes)
    idle-timeout: 600000
    # Maximum connection lifetime in milliseconds (1800000 = 30 minutes)
    max-lifetime: 1800000
    # Database lock timeout in milliseconds (30000 = 30 seconds)
    busy-timeout: 30000
    # Journaling mode (WAL allows reading while writing)
    journal-mode: "WAL"
    # Synchronization level (NORMAL - balance of speed and reliability)
    synchronous: "NORMAL"
  # MySQL settings (used ONLY if type: mysql)
  mysql:
    # MySQL server address
    # localhost - if MySQL is on the same server as Minecraft
    # IP address - if MySQL is on a separate server
    host: "localhost"
    # MySQL server port
    # 3306 - standard MySQL port
    port: 3306
    # Database name
    # Will be created automatically if it doesn't exist
    database: "cpa"
    # MySQL username
    # root - superuser (NOT recommended for production)
    # Better to create a separate user with privileges only on this database
    username: "root"
    # MySQL user password
    # Leave empty if there is no password (NOT recommended)
    password: ""

# ============================================
# TRACKED MODERATOR COMMANDS
# ============================================
# All these commands are LOGGED when used by staff
# Data is saved to the cpa_staff_actions table
# Used for:
#   - Staff statistics (/cpa staff)
#   - Abuse_score calculation
#   - Moderator action auditing
# ============================================
tracked_moder_commands:
  - "give"        # Item giving (often abused)
  - "gamemode"    # Game mode change (self or others)
  - "ban"         # Bans (need to know who and why)
  - "mute"        # Mutes (temporary silencing)
  - "kick"        # Kicks (ejecting from the server)
  - "invsee"      # Viewing other's inventories (privacy)
  - "tp"          # Teleportation (can be used for stalking)
  - "fly"         # Flight mode (unfair advantage)
  - "god"         # God mode (invincibility)
  - "heal"        # Healing (self or others)
  - "gm"

# ============================================
# TRACKED PLAYER COMMANDS
# ============================================
# Commands of regular players that are logged
# Data is saved to the cpa_command_logs table
# Used for:
#   - Player statistics (/cpa stats)
#   - Finding anomalous activity
# ============================================
tracked_player_commands:
  - "msg"    # Private messages (may contain complaints/insults)
  - "tpa"    # Teleport requests (social activity)
  - "home"   # Teleport home (frequency of use)
  - "spawn"  # Teleport to spawn
  - "kit"    # Getting kits (economic activity)

# ============================================
# SUPER COMMANDS (DETAILED LOGGING)
# ============================================
# For these commands, EXTENDED information is saved in JSON format
# Regular commands only save the fact of use
# Super commands save ALL parameters
# ============================================
super_commands:
  # Command /give
  give:
    # Enable detailed logging
    track: true
    # Which fields to save in JSON
    fields: 
      - "target"  # Who received the item
      - "item"    # Which item (e.g., minecraft:diamond)
      - "amount"  # How many
      - "world"   # In which world
      - "x"       # Coordinate X
      - "y"       # Coordinate Y
      - "z"       # Coordinate Z
  # Command /gamemode  
  gamemode:
    track: true
    fields:
      - "target"      # Who is changing mode
      - "old_mode"    # What mode was BEFORE (survival/creative/adventure/spectator)
      - "new_mode"    # What mode became AFTER
      - "world"
      - "x"
      - "y"
      - "z"

# ============================================
# PROHIBITED PERMISSIONS
# ============================================
# Permissions that staff should NOT have
# When such a permission is detected on an employee:
#   - Logged
#   - Points added to abuse_score
#   - Notification sent to the owner
# ============================================
prohibited_permissions:
  - "minecraft.command.op"  # Permission to grant operator (critical!)
  - "*"                     # ALL permissions (superadmin - only owner)
  - "luckperms.*"           # Full access to LuckPerms

# ============================================
# WEIGHTS FOR ABUSE_SCORE CALCULATION
# ============================================
# Abuse Score - abuse rating from 0 to 100
# Each suspicious action adds a certain number of points
# When thresholds (staff_warnings) are reached, punishments are applied
# ============================================
abuse_weights:
  # Ban without specifying a reason (suspicious)
  # Example: /ban Player (without reason)
  ban_without_reason: 10
  # Giving items to YOURSELF
  # Example: /give AllF1RE diamond 64
  self_give_items: 8
  # Changing game mode for YOURSELF
  # Example: /gamemode creative (without specifying a player)
  self_gamemode_change: 3
  # Granting operator (to anyone)
  # Example: /op Player
  op_self: 20
  # Frequent teleports (more than 10 times per hour)
  # May indicate stalking or avoiding checks
  teleport_spam: 5
  # Griefing (detected via CoreProtect)
  # Added when breaking blocks that other players have interacted with
  griefing: 10

# ============================================
# STAFF WARNINGS
# ============================================
# Automatic actions when a certain abuse_score is reached
# Levels are applied SEQUENTIALLY (first moderator, then admin)
# ============================================
staff_warnings:
  # Level 1: Moderator (light warning)
  moderator:
    # Enable this level
    enabled: true
    # Trigger threshold (abuse_score >= 30)
    # 0-29 = normal, 30-49 = moderator level
    threshold: 30
    # Commands executed when triggered
    # %player_name% - staff nickname
    # %score% - current abuse_score
    commands:
      # Take 100 in-game currency (requires CMI)
      #- "asConsole! cmi money take %player_name% 100"
      # Send a private message
      - "message! &c&l⚠ &7Your abuse rating has exceeded the norm!"
  # Level 2: Admin (strict warning)
  admin:
    enabled: true
    threshold: 50  # 50-69 = admin level
    commands:
      # Take 500 currency
      #- "asConsole! cmi money take %player_name% 500"
      # Notify the ENTIRE server
      - "broadcast! &c&l[CPA] &f%player_name% &7has received a strict warning!"

# ============================================
# AUTO WARN CLEARING
# ============================================
# System for automatically removing warnings when conditions are met
# Checked periodically (check_interval_ticks)
# ============================================
warn_clear:
  # Enable auto-clearing
  enabled: true
  # Check interval (in ticks)
  # 12000 ticks = 10 minutes (12000 / 20 / 60 = 10)
  # How often the plugin checks if warnings need to be cleared
  check_interval_ticks: 12000
  # List of checks (you can add your own)
  checks:
    # "Good behavior" check
    good_behavior:
      # Enable this check
      enabled: true
      # Check name (for logs)
      name: "Good behavior"
      # Condition for triggering
      # AND = both conditions must be true
      # %cpa_player_warnings_count_{player}% > 0 = has active warnings
      # %cpa_player_time_since_last_violation_{player}% > 86400 = >24 hours since last violation
      # 86400 seconds = 24 hours (60 * 60 * 24)
      condition: "%cpa_player_warnings_count_{player}% > 0 AND %cpa_player_time_since_last_violation_{player}% > 86400"
      # Commands when triggered
      commands:
        # Remove 1 warning (flag -s = silent, no chat output)
        - "asConsole! cpa warn clear %player_name% 1 -s"
        # Notify the player
        - "message! &a&l✔ &7Warning removed for good behavior!"

# ============================================
# GENERAL REPORT SETTINGS
# ============================================
# Detailed report settings are in reports.yml
# Only the main switches are here
# ============================================
reports:
  # Enable the report system
  # If false - the /report command will be disabled
  enabled: true
  # Cooldown between reports (seconds)
  # 60 = 1 minute between reports from the same player
  cooldown_seconds: 60
  # Auto-cleanup of old reports (days)
  # 30 = reports older than 30 days are deleted
  # 0 = never delete
  cleanup_days: 30

# ============================================
# GRIEF DETECTION (via CoreProtect DB)
# ============================================
# The plugin reads the CoreProtect database directly and checks
# if anyone else interacted with the block before the current player.
# If yes - it is considered possible grief.
# ============================================
# Detection is enabled in regions
grief_detection:
  enabled: true
  # WorldGuard regions where anti-grief protection WORKS
  # If the list is empty - works EVERYWHERE (except protected regions)
  # Example: ["__global__", "dungeon", "arena"]
  allowed_regions:
    - "__global__"
    #- "dungeon"
  tracked_blocks:
    - "CHEST"                 # Chest
    - "TRAPPED_CHEST"         # Trapped Chest
    - "FURNACE"               # Furnace
    - "BLAST_FURNACE"         # Blast Furnace
    - "SMOKER"                # Smoker
    - "BARREL"                # Barrel
    - "SHULKER_BOX"           # Shulker Box (any color)
    - "WHITE_SHULKER_BOX"     # White Shulker Box
    - "ORANGE_SHULKER_BOX"    # Orange Shulker Box
    - "MAGENTA_SHULKER_BOX"   # Magenta Shulker Box
    - "LIGHT_BLUE_SHULKER_BOX" # Light Blue Shulker Box
    - "YELLOW_SHULKER_BOX"    # Yellow Shulker Box
    - "LIME_SHULKER_BOX"      # Lime Shulker Box
    - "PINK_SHULKER_BOX"      # Pink Shulker Box
    - "GRAY_SHULKER_BOX"      # Gray Shulker Box
    - "LIGHT_GRAY_SHULKER_BOX" # Light Gray Shulker Box
    - "CYAN_SHULKER_BOX"      # Cyan Shulker Box
    - "PURPLE_SHULKER_BOX"    # Purple Shulker Box
    - "BLUE_SHULKER_BOX"      # Blue Shulker Box
    - "BROWN_SHULKER_BOX"     # Brown Shulker Box
    - "GREEN_SHULKER_BOX"     # Green Shulker Box
    - "RED_SHULKER_BOX"       # Red Shulker Box
    - "BLACK_SHULKER_BOX"     # Black Shulker Box
    - "HOPPER"                # Hopper
    - "DISPENSER"             # Dispenser
    - "DROPPER"               # Dropper
    - "BREWING_STAND"         # Brewing Stand
    - "ENCHANTING_TABLE"      # Enchanting Table
    - "ANVIL"                 # Anvil
    - "BEACON"                # Beacon
# ============================================
grief_detection:
  # Enable grief detection
  enabled: true
  # Blocks that are tracked for griefing
  # All standard Minecraft block names are supported
  tracked_blocks:
    - "CHEST"                 # Chest
    - "TRAPPED_CHEST"         # Trapped Chest
    - "FURNACE"               # Furnace
    - "BLAST_FURNACE"         # Blast Furnace
    - "SMOKER"                # Smoker
    - "BARREL"                # Barrel
    - "SHULKER_BOX"           # Shulker Box (any color)
    - "WHITE_SHULKER_BOX"     # White Shulker Box
    - "ORANGE_SHULKER_BOX"    # Orange Shulker Box
    - "MAGENTA_SHULKER_BOX"   # Magenta Shulker Box
    - "LIGHT_BLUE_SHULKER_BOX" # Light Blue Shulker Box
    - "YELLOW_SHULKER_BOX"    # Yellow Shulker Box
    - "LIME_SHULKER_BOX"      # Lime Shulker Box
    - "PINK_SHULKER_BOX"      # Pink Shulker Box
    - "GRAY_SHULKER_BOX"      # Gray Shulker Box
    - "LIGHT_GRAY_SHULKER_BOX" # Light Gray Shulker Box
    - "CYAN_SHULKER_BOX"      # Cyan Shulker Box
    - "PURPLE_SHULKER_BOX"    # Purple Shulker Box
    - "BLUE_SHULKER_BOX"      # Blue Shulker Box
    - "BROWN_SHULKER_BOX"     # Brown Shulker Box
    - "GREEN_SHULKER_BOX"     # Green Shulker Box
    - "RED_SHULKER_BOX"       # Red Shulker Box
    - "BLACK_SHULKER_BOX"     # Black Shulker Box
    - "HOPPER"                # Hopper
    - "DISPENSER"             # Dispenser
    - "DROPPER"               # Dropper
    - "BREWING_STAND"         # Brewing Stand
    - "ENCHANTING_TABLE"      # Enchanting Table
    - "ANVIL"                 # Anvil
    - "BEACON"                # Beacon
  # Commands executed when griefing is detected on a REGULAR player
  # Available variables:
  #   %player_name% - player nickname
  #   %player_uuid% - player UUID
  #   %world% - world name
  #   %x%, %y%, %z% - block coordinates
  #   %block% - block type
  grief_commands:
    # Issue a warning for 20 minutes, silent mode (-s = don't write to chat)
    - "asConsole! cpa warn %player_name% Griefing at %world% %x% %y% %z% -t:20m -s"
    # Write to log
    - "log! Possible grief: %player_name% broke %block% at %world% %x% %y% %z%"
  # Commands executed if a STAFF member griefs (player with cpa.staff permission)
  staff_grief_commands:
    # Issue a warning for 1 hour
    - "asConsole! cpa warn %player_name% Staff griefing detected -t:1h"
    # Notify everyone
    #- "broadcast! &c[CPA] Staff member %player_name% suspected of griefing!"
  # Weight for abuse_score (added to staff when griefing)
  abuse_weight: 10
  # Minimum time between triggers for the same player (in seconds)
  # Spam protection - if a player breaks many blocks in a row,
  # detection will only trigger once in the specified interval
  min_time_between_actions: 60