# This file controls the ENTIRE report system:
# - Limits and cooldowns for players
# - Report categories with auto-detection via regex
# - Automatic violator analysis
# - Abuse protection (false reports)
# ============================================

# ============================================
# MAIN REPORT SETTINGS
# ============================================
reports:
  # Enable/disable the ENTIRE report system
  # true - /report command works
  # false - /report command is disabled
  enabled: true
  # Cooldown between reports from ONE player (in seconds)
  # 60 = 1 minute between reports
  # Protection against report spam
  cooldown_seconds: 60
  # Minimum playtime to submit a report (in hours)
  # 1 = player must have played at least 1 hour
  # Protection against alts/bots created only for reporting
  # Only works if CMI is installed (takes playtime from there)
  min_playtime_hours: 1
  # Maximum number of reports ONE player can submit per hour
  # 5 = no more than 5 reports per hour
  # If exceeded - report is rejected
  max_reports_per_player_per_hour: 5
  # Maximum number of reports on ONE player per hour
  # 10 = if a player has already been reported 10 times per hour, new reports are rejected
  # Protection against mass reports on an innocent player (report raid)
  max_reports_per_target_per_hour: 10
  # Threshold for determining REPORT ABUSE
  # 8 = if a player submits 8+ reports per hour, the system considers it abuse
  # When reached, actions from the anti_abuse section are triggered
  report_abuse_threshold: 8
  # Whether to notify staff about new reports
  # true = everyone with cpa.report.see permission will see the message
  # false = only logging to database
  notify_staff: true
  # Automatic cleanup of old reports (in days)
  # 30 = reports older than 30 days are deleted from the database
  # Saves database space
  # 0 = never delete
  cleanup_days: 30

# ============================================
# REPORT CATEGORIES
# ============================================
# Categories are determined AUTOMATICALLY by the report text
# Check order: as in the file (top to bottom)
# If none match - "other" is used
# ============================================
categories:
  # Griefing / theft
  griefing:
    # Regular expression for auto-detection of category
    # (?i) = case insensitive
    # | = logical OR
    regex: "(?i)(grief|broke|destroyed|stole|grief|steal)"
    # Violation weight (used in violator analysis)
    # 1 = light, 3 = medium, 5 = severe
    # The higher the weight, the faster the player will receive automatic punishment
    weight: 3
    # Human-readable category description (for logs and notifications)
    description: "Griefing / Theft"
    # Category color in notifications (codes &a, &c, &e, etc.)
    color: "&c"
  # Cheating (hacks)
  cheating:
    regex: "(?i)(cheat|hacker|cheating|killaura|fly|xray)"
    weight: 5  # Highest weight - immediate reaction
    description: "Cheating"
    color: "&4"
  # Offensive language / toxicity
  offensive_language:
    regex: "(?i)(swear|insult|toxic|rude)"
    weight: 2
    description: "Offensive language"
    color: "&e"
  # Spam / flood
  spam_flood:
    regex: "(?i)(spam|flood)"
    weight: 1  # Low weight - not critical
    description: "Spam / Flood"
    color: "&6"
  # Trolling
  trolling:
    regex: "(?i)(troll|annoying|disturbing)"
    weight: 2
    description: "Trolling"
    color: "&d"
  # Other (if no category matched)
  other:
    regex: ".*"  # Matches ANY text
    weight: 1
    description: "Other"
    color: "&7"
# ============================================
# VIOLATOR ANALYSIS
# ============================================
# Automatically determines whether a player deserves punishment
# based on: playtime, warnings, number of reports
# ============================================
violator_analysis:
  # Enable automatic violator analysis
  enabled: true
  # Minimum playtime for analysis (in hours)
  # 5 = only players with 5+ hours of playtime are analyzed
  # New players are not automatically punished (may be victims of bullying)
  min_playtime_hours: 5
  # Maximum number of ACTIVE warnings
  # 3 = if a player has 3+ warnings, they are considered a violator
  max_warnings_threshold: 3
  # Maximum number of reports in 24 hours
  # 5 = if 5+ reports per day, the player is considered a violator
  max_reports_threshold: 5
  # Actions when thresholds are exceeded
  actions:
    # Automatic warning issuance
    auto_warn:
      enabled: true
      # At how many reports to issue a warning
      # 3 = at 3+ reports in 24 hours
      threshold: 3
      # Commands when triggered
      # %target% - violator nickname
      commands:
        - "asConsole! cpa warn %target% Many reports from players"
        - "broadcast! &c[CPA] &f%target% &7received a warning due to reports!"

# ============================================
# REPORT ABUSE PROTECTION
# ============================================
# Punishment for those who spam FALSE reports
# ============================================
anti_abuse:
  # Enable abuse protection
  enabled: true
  # Actions when abuse is detected
  actions:
    # Warning for report spammer
    warn_reporter:
      enabled: true
      # At how many reports per hour to issue a warning
      # 5 = at 5+ reports per hour
      threshold: 5
      # %reporter% - nickname of the one spamming reports
      commands:
        - "message! &cYou are submitting too many reports!"
        - "asConsole! cpa warn %reporter% Report spam"