# This file contains ALL rules for chat processing:
# - Punishments for swearing/insults/advertising
# - Apologies (remove warnings)
# - Notifications (only warning without punishment)
# 
# action types:
#   punish  - issue a punishment (ban/mute/kick/warn)
#   apology - remove warnings (apology)
#   notify  - only notification (chat is NOT blocked)
# ============================================

# ============================================
# GLOBAL SETTINGS
# ============================================
# These settings apply to ALL rules below
# ============================================
global:
  # Enable/disable the ENTIRE chat filter
  # true = plugin checks all messages
  # false = filter is completely disabled
  enabled: true
  # Filter operation mode when a punishment is triggered
  # strict  - message is COMPLETELY blocked (player doesn't see it, others don't see it)
  # replace - swearing is replaced with replacement (***), message reaches everyone
  # silent  - message reaches everyone, but violation is logged
  mode: "strict"
  # What to replace swearing with in mode: replace
  # You can specify any text: "***", "[CENSORED]", "♥", etc.
  replacement: "***"
  # Cooldown between triggers of ANY rules for the same player (in ticks)
  # 20 ticks = 1 second
  # 60 ticks = 3 seconds
  # Protects against punishment spam (if a player swears in every message)
  cooldown_ticks: 60
  # Whether to check regular chat (messages from players)
  # true = check, false = do not check
  check_chat: true
  # Whether to check commands (e.g., /msg, /tell, /me)
  # true = check command content, false = do not check
  check_commands: true
  # Logging settings
  logging:
    # Enable logging of all triggers to a file
    enabled: true
    # Path to the log file relative to the plugin folder
    # Will be created: plugins/CoreProtectionAssistant/logs/chat_rules.log
    file: "logs/chat_rules.log"

# ============================================
# EXCLUSIONS
# ============================================
# Who is NOT checked by the chat filter
# ============================================
exclusions:
  # Players with THESE permissions are NOT checked
  # Useful for administrators and moderators
  permissions:
    - "cpa.bypass.chat"   # Special permission to bypass the filter
    - "cpa.admin"          # Plugin administrators
  # Specific players by NICKNAME who are not checked
  # WARNING: when changing nickname, you need to update this!
  # Example: players: ["AllF1RE", "Notch", "Dream"]
  players: []
  # LuckPerms groups that are not checked
  # Only works if LuckPerms is installed
  # Example: groups: ["admin", "moderator", "vip"]
  groups:
    - "admin"
# ============================================
# PUNISHMENT SETTINGS (for action: punish)
# ============================================
# These settings apply only to rules with action: "punish"
# ============================================
punishment:
  # Recidivism = repeated violations in a short time
  # If a player violates several times in a row, the punishment is INCREASED
  recidivism:
    # Enable the recidivism system
    enabled: true
    # Time window for counting recidivism (in ticks)
    # 72000 ticks = 1 hour (72000 / 20 / 60 / 60 = 1)
    # If a player violates 2+ times during this time, punishment is increased
    time_window_ticks: 72000
    # Recidivism levels (by number of violations in the window)
    levels:
      # Level 2: second violation in the specified time
      2:
        # Punishment duration multiplier
        # 1.5 = punishment will be 1.5 times longer
        # For example, if base mute is 10 minutes, with recidivism it will be 15 minutes
        duration_multiplier: 1.5
        # Additional commands when this level is triggered
        commands:
          - "message! &cSecond violation in one hour!"
      # Level 3: third violation
      3:
        # Double duration
        duration_multiplier: 2.0
        commands:
          - "message! &cThird violation!"
      # Level 4: fourth and more violations
      4:
        # Complete override of punishment type (instead of warn - ban)
        override_punishment: "ban"
        # Fixed duration for ban (24 hours = 864000 ticks)
        duration_ticks: 864000
        commands:
          - "message! &4Too many violations! Ban for 24 hours."
# ============================================
# APOLOGY SETTINGS (for action: apology)
# ============================================
# These settings apply only to rules with action: "apology"
# ============================================
apology:
  # Global cooldown between apologies from the same player (in ticks)
  # 48000 ticks = 40 minutes (48000 / 20 / 60 = 40)
  # To prevent players from spamming apologies to remove warnings
  global_cooldown_ticks: 48000
  # Maximum number of warnings that can be removed in ONE DAY
  # Protection against abuse of the apology system
  max_warnings_clear_per_day: 5
  # Whether to require specifying a TARGET for the apology
  # true = the message must contain the nickname of the player being apologized to
  # false = apology is counted without specifying a target
  require_target: true
# ============================================
# RULES (main list)
# ============================================
# Check order: by descending priority
# The HIGHER the priority, the EARLIER the rule is checked
# If a rule triggers, the others are NOT checked
# ============================================
rules:
  # ==========================================
  # PUNISHMENTS (action: punish)
  # ==========================================
  # Severe insult (ban for 7 days)
  severe_insult:
    # Whether the rule is enabled
    enabled: true
    # Check priority (higher = checked earlier)
    # Range: 1-200 (recommended)
    priority: 100
    # Regular expression to search for
    # (?i) = case insensitive
    # | = logical OR
    regex: "(?i)(fuck you|motherfucker|son of a bitch)"
    # Action type (punish/apology/notify)
    action: "punish"
    # Punishment type: warn, mute, kick, ban, none
    punishment: "ban"
    # Punishment duration in ticks
    # 6048000 ticks = 7 days (6048000 / 20 / 60 / 60 / 24 = 7)
    duration_ticks: 6048000
    # Whether this punishment can be removed via apology
    # true = player can apologize and the warning will be removed
    # false = apologies will not help
    can_be_apologized: true
    # Commands executed when triggered
    # Prefixes:
    #   message! - send a message to the player
    #   asConsole! - execute a command from console
    #   broadcast! - message to all players
    #   sound! - play a sound (SOUND VOLUME PITCH)
    # Variables:
    #   %player_name% - violator's name
    #   %player_uuid% - violator's UUID
    #   %message% - original message
    commands:
      - "message! &4&l⛔ &7Severe insult! Ban for 7 days."
      - "asConsole! ban %player_name% 7d Severe insult - CPA"
  # Medium swearing (warning + mute 15 minutes)
  medium_swear:
    enabled: true
    priority: 80
    regex: "(?i)(fuck|shit|bitch|damn)"
    action: "punish"
    punishment: "warn"
    duration_ticks: 36000  # 30 minutes (warning)
    # Additional punishment (issued ALONG with the main one)
    additional_punishment: "mute"
    additional_duration_ticks: 18000  # 15 minutes (mute)
    can_be_apologized: true
    commands:
      - "message! &c&l⚠ &7Swearing! Warning + 15 min mute."
      - "asConsole! cpa warn %player_name% Profanity"
      - "asConsole! mute %player_name% 15m Profanity - CPA"
  # Light insult (warning only)
  light_swear:
    enabled: true
    priority: 60
    regex: "(?i)(stupid|dumb|idiot|moron)"
    action: "punish"
    punishment: "warn"
    duration_ticks: 12000  # 10 minutes
    can_be_apologized: true
    commands:
      - "message! &e&l⚠ &7Insult! Warning for 10 min."
      - "asConsole! cpa warn %player_name% Insult"
  # Racism/discrimination (ban for 30 days, no right to apologize)
  racism:
    enabled: true
    priority: 200  # Highest priority - checked first
    regex: "(?i)(nigger|faggot|racist|kike)"
    action: "punish"
    punishment: "ban"
    duration_ticks: 2592000  # 30 days
    # Racism CANNOT be removed by apology
    can_be_apologized: false
    commands:
      - "message! &4&l⛔ &7Racism! Ban for 30 days."
      - "asConsole! ban %player_name% 30d Racism - CPA"
  # Advertising other servers (mute 24h + warning)
  advertising:
    enabled: true
    priority: 90
    # \\. - escaped dot (the dot character, not any character)
    regex: "(?i)(join|ip:|play\\.|mc\\.|advertising|server)"
    action: "punish"
    punishment: "mute"
    duration_ticks: 864000  # 24 hours
    additional_punishment: "warn"
    can_be_apologized: true
    commands:
      - "message! &c&l⛔ &7Advertising! 24h mute + warning."

  # ==========================================
  # APOLOGIES (action: apology)
  # ==========================================
  # Trigger on messages with apologies and REMOVE warnings
  # Simple apology (removes 1 warning)
  simple_apology:
    enabled: true
    # Low priority - checked after punishments
    # (so that swearing is not disguised as an apology)
    priority: 15
    regex: "(?i)(sorry|apologize|forgive me|my bad)"
    action: "apology"
    # How many active warnings to remove
    warnings_clear: 1
    # Require apology target (nickname in message)
    require_target: true
    commands:
      - "message! &a&l✔ &7Apology accepted! -1 warning."
      # message_target! - send a message to the TARGET of the apology
      - "message_target! &a&l✔ &f%player_name% &7apologized to you!"
  # Deep apology (removes 2 warnings)
  deep_apology:
    enabled: true
    priority: 25  # Higher than simple, checked earlier
    regex: "(?i)(i was wrong|i promise|sincerely|truly sorry)"
    action: "apology"
    warnings_clear: 2
    require_target: true
    commands:
      - "message! &a&l✿ &7Deep apology! -2 warnings."
  # ==========================================
  # NOTIFICATIONS (action: notify)
  # ==========================================
  # Do not punish, only warn the player
  # Chat is NOT blocked!
  # Spam with capital letters (CAPS)
  spam_caps:
    enabled: true
    # Lowest priority - checked last
    priority: 10
    # Regex: string of 30+ capital letters/spaces
    # ^ - start of string
    # [A-Z\\s] - capital Latin letters + space
    # {30,} - 30 or more characters
    # $ - end of string
    regex: "^[A-Z\\s]{30,}$"
    # Only notification, no punishment
    action: "notify"
    commands:
      - "message! &e&l⚠ &7Do not abuse CAPITAL letters."