# CoreProtectionAssistant - Unified Chat Rules
# Author: AllF1RE
#
# action types:
#   punish  - –≤—Л–і–∞—В—М –љ–∞–Ї–∞–Ј–∞–љ–Є–µ
#   apology - —Б–љ—П—В—М –њ—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є—П
#   notify  - —В–Њ–ї—М–Ї–Њ —Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є–µ

global:
  enabled: true
  mode: "strict"
  replacement: "***"
  cooldown_ticks: 60
  check_chat: true
  check_commands: true
  logging:
    enabled: true
    file: "logs/chat_rules.log"

exclusions:
  permissions:
    - "cpa.bypass.chat"
    - "cpa.admin"
  players: []
  groups:
    - "admin"

punishment:
  recidivism:
    enabled: true
    time_window_ticks: 72000
    levels:
      2:
        duration_multiplier: 1.5
        commands:
          - "message! &c–Т—В–Њ—А–Њ–µ –љ–∞—А—Г—И–µ–љ–Є–µ –Ј–∞ —З–∞—Б!"
      3:
        duration_multiplier: 2.0
        commands:
          - "message! &c–Ґ—А–µ—В—М–µ –љ–∞—А—Г—И–µ–љ–Є–µ!"
      4:
        override_punishment: "ban"
        duration_ticks: 864000
        commands:
          - "message! &4–Ь–љ–Њ–≥–Њ –љ–∞—А—Г—И–µ–љ–Є–є! –С–∞–љ –љ–∞ 24 —З–∞—Б–∞."

apology:
  global_cooldown_ticks: 48000
  max_warnings_clear_per_day: 5
  require_target: true

rules:
  # === –Э–Р–Ъ–Р–Ч–Р–Э–Ш–ѓ ===
  severe_insult:
    enabled: true
    priority: 100
    regex: "(?i)(—В–≤–Њ—О –Љ–∞—В—М|—В–≤–Њ—О –Љ–∞–Љ—Г|fuck you|motherfucker)"
    action: "punish"
    punishment: "ban"
    duration_ticks: 6048000
    can_be_apologized: true
    commands:
      - "message! &4&lвЫФ &7–Ґ—П–ґ–µ–ї–Њ–µ –Њ—Б–Ї–Њ—А–±–ї–µ–љ–Є–µ! –С–∞–љ –љ–∞ 7 –і–љ–µ–є."
      - "asConsole! ban %player_name% 7d –Ґ—П–ґ–µ–ї–Њ–µ –Њ—Б–Ї–Њ—А–±–ї–µ–љ–Є–µ - CPA"

  medium_swear:
    enabled: true
    priority: 80
    regex: "(?i)(–±–ї—П|—Б—Г–Ї–∞|–њ–Є–Ј–і|—Е—Г–є|fuck|shit|bitch)"
    action: "punish"
    punishment: "warn"
    duration_ticks: 36000
    additional_punishment: "mute"
    additional_duration_ticks: 18000
    can_be_apologized: true
    commands:
      - "message! &c&lвЪ† &7–Ь–∞—В! –Я—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є–µ + –Љ—Г—В 15 –Љ–Є–љ."
      - "asConsole! cpa warn %player_name% –Э–µ—Ж–µ–љ–Ј—Г—А–љ–∞—П –ї–µ–Ї—Б–Є–Ї–∞"
      - "asConsole! mute %player_name% 15m –Ь–∞—В - CPA"

  light_swear:
    enabled: true
    priority: 60
    regex: "(?i)(–і—Г—А–∞–Ї|–Є–і–Є–Њ—В|–і–µ–±–Є–ї|—В—Г–њ–Њ–є|dumb|stupid)"
    action: "punish"
    punishment: "warn"
    duration_ticks: 12000
    can_be_apologized: true
    commands:
      - "message! &e&lвЪ† &7–Ю—Б–Ї–Њ—А–±–ї–µ–љ–Є–µ! –Я—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є–µ –љ–∞ 10 –Љ–Є–љ."
      - "asConsole! cpa warn %player_name% –Ю—Б–Ї–Њ—А–±–ї–µ–љ–Є–µ"

  racism:
    enabled: true
    priority: 200
    regex: "(?i)(–љ–Є–≥–≥–µ—А|–љ–Є–≥–∞|—З—Г—А–Ї–∞|—А–∞—Б–Є—Б—В|nigger|faggot)"
    action: "punish"
    punishment: "ban"
    duration_ticks: 2592000
    can_be_apologized: false
    commands:
      - "message! &4&lвЫФ &7–†–∞—Б–Є–Ј–Љ! –С–∞–љ –љ–∞ 30 –і–љ–µ–є."
      - "asConsole! ban %player_name% 30d –†–∞—Б–Є–Ј–Љ - CPA"

  advertising:
    enabled: true
    priority: 90
    regex: "(?i)(–Ј–∞—Е–Њ–і–Є—В–µ|–∞–є–њ–Є|ip:|play\\.|mc\\.|—А–µ–Ї–ї–∞–Љ–∞)"
    action: "punish"
    punishment: "mute"
    duration_ticks: 864000
    additional_punishment: "warn"
    can_be_apologized: true
    commands:
      - "message! &c&lвЫФ &7–†–µ–Ї–ї–∞–Љ–∞! –Ь—Г—В 24—З + –њ—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є–µ."

  # === –Ш–Ч–Т–Ш–Э–Х–Э–Ш–ѓ ===
  simple_apology:
    enabled: true
    priority: 15
    regex: "(?i)(–њ—А–Њ—Б—В–Є|–Є–Ј–≤–Є–љ–Є|—Б–Њ—А—А–Є|sorry|–≤–Є–љ–Њ–≤–∞—В)"
    action: "apology"
    warnings_clear: 1
    require_target: true
    commands:
      - "message! &a&lвЬФ &7–Ш–Ј–≤–Є–љ–µ–љ–Є–µ –њ—А–Є–љ—П—В–Њ! -1 –≤–∞—А–љ."
      - "message_target! &a&lвЬФ &f%player_name% &7–Є–Ј–≤–Є–љ–Є–ї—Б—П –њ–µ—А–µ–і –≤–∞–Љ–Є!"

  deep_apology:
    enabled: true
    priority: 25
    regex: "(?i)(—П –±—Л–ї –љ–µ–њ—А–∞–≤|–Њ–±–µ—Й–∞—О|–Є—Б–Ї—А–µ–љ–љ–µ|–ґ–∞–ї–µ—О)"
    action: "apology"
    warnings_clear: 2
    require_target: true
    commands:
      - "message! &a&lвЬњ &7–У–ї—Г–±–Њ–Ї–Њ–µ –Є–Ј–≤–Є–љ–µ–љ–Є–µ! -2 –≤–∞—А–љ–∞."

  # === –£–Т–Х–Ф–Ю–Ь–Ы–Х–Э–Ш–ѓ ===
  spam_caps:
    enabled: true
    priority: 10
    regex: "^[A-Z–Р-–ѓ–Б\\s]{30,}$"
    action: "notify"
    commands:
      - "message! &e&lвЪ† &7–Э–µ –Ј–ї–Њ—Г–њ–Њ—В—А–µ–±–ї—П–є—В–µ –Ч–Р–У–Ы–Р–Т–Э–Ђ–Ь–Ш –±—Г–Ї–≤–∞–Љ–Є."
