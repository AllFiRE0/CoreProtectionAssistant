# Этот файл содержит ВСЕ правила для обработки чата:
# - Наказания за мат/оскорбления/рекламу
# - Извинения (снимают предупреждения)
# - Уведомления (только предупреждение без наказания)
# 
# action types (типы действий):
#   punish  - выдать наказание (бан/мут/кик/варн)
#   apology - снять предупреждения (извинение)
#   notify  - только уведомление (чат НЕ блокируется)
# ============================================

# ============================================
# ГЛОБАЛЬНЫЕ НАСТРОЙКИ
# ============================================
# Эти настройки применяются ко ВСЕМ правилам ниже
# ============================================
global:
  # Включить/выключить ВЕСЬ фильтр чата
  # true = плагин проверяет все сообщения
  # false = фильтр полностью отключен
  enabled: true
  # Режим работы фильтра при срабатывании наказания
  # strict  - сообщение ПОЛНОСТЬЮ блокируется (игрок его не видит, другие не видят)
  # replace - мат заменяется на replacement (***), сообщение доходит до всех
  # silent  - сообщение доходит до всех, но нарушение логируется
  mode: "strict"
  # На что заменять мат при mode: replace
  # Можно указать любой текст: "***", "[ЦЕНЗУРА]", "♥" и т.д.
  replacement: "***"
  # Кулдаун между срабатываниями ЛЮБЫХ правил для одного игрока (в тиках)
  # 20 тиков = 1 секунда
  # 60 тиков = 3 секунды
  # Защищает от спама наказаниями (если игрок пишет мат в каждом сообщении)
  cooldown_ticks: 60
  # Проверять ли обычный чат (сообщения от игроков)
  # true = проверять, false = не проверять
  check_chat: true
  # Проверять ли команды (например, /msg, /tell, /me)
  # true = проверять содержимое команд, false = не проверять
  check_commands: true
  # Настройки логирования
  logging:
    # Включить запись всех срабатываний в файл
    enabled: true
    # Путь к файлу лога относительно папки плагина
    # Будет создан: plugins/CoreProtectionAssistant/logs/chat_rules.log
    file: "logs/chat_rules.log"

# ============================================
# ИСКЛЮЧЕНИЯ
# ============================================
# Кто НЕ проверяется фильтром чата
# ============================================
exclusions:
  # Игроки с ЭТИМИ правами НЕ проверяются
  # Полезно для администраторов и модераторов
  permissions:
    - "cpa.bypass.chat"   # Специальное право для обхода фильтра
    - "cpa.admin"          # Администраторы плагина
  # Конкретные игроки по НИКУ, которые не проверяются
  # ВНИМАНИЕ: при смене ника нужно обновлять!
  # Пример: players: ["AllF1RE", "Notch", "Dream"]
  players: []
  # Группы LuckPerms, которые не проверяются
  # Работает только если LuckPerms установлен
  # Пример: groups: ["admin", "moderator", "vip"]
  groups:
    - "admin"
# ============================================
# НАСТРОЙКИ НАКАЗАНИЙ (для action: punish)
# ============================================
# Эти настройки применяются только к правилам с action: "punish"
# ============================================
punishment:
  # Рецидив = повторные нарушения за короткое время
  # Если игрок нарушает несколько раз подряд, наказание УСИЛИВАЕТСЯ
  recidivism:
    # Включить систему рецидива
    enabled: true
    # Временное окно для подсчёта рецидива (в тиках)
    # 72000 тиков = 1 час (72000 / 20 / 60 / 60 = 1)
    # Если игрок нарушает 2+ раз за это время, наказание усиливается
    time_window_ticks: 72000
    # Уровни рецидива (по количеству нарушений в окне)
    levels:
      # Уровень 2: второе нарушение за указанное время
      2:
        # Множитель длительности наказания
        # 1.5 = наказание будет в 1.5 раза дольше
        # Например, если базовый мут 10 минут, то при рецидиве будет 15 минут
        duration_multiplier: 1.5
        # Дополнительные команды при срабатывании этого уровня
        commands:
          - "message! &cВторое нарушение за час!"
      # Уровень 3: третье нарушение
      3:
        # Удвоение длительности
        duration_multiplier: 2.0
        commands:
          - "message! &cТретье нарушение!"
      # Уровень 4: четвёртое и более нарушений
      4:
        # Полная замена типа наказания (вместо варна - бан)
        override_punishment: "ban"
        # Фиксированная длительность для бана (24 часа = 864000 тиков)
        duration_ticks: 864000
        commands:
          - "message! &4Много нарушений! Бан на 24 часа."
# ============================================
# НАСТРОЙКИ ИЗВИНЕНИЙ (для action: apology)
# ============================================
# Эти настройки применяются только к правилам с action: "apology"
# ============================================
apology:
  # Глобальный кулдаун между извинениями одного игрока (в тиках)
  # 48000 тиков = 40 минут (48000 / 20 / 60 = 40)
  # Чтобы игроки не спамили извинениями для снятия варнов
  global_cooldown_ticks: 48000
  # Максимальное количество предупреждений, которое можно снять за ОДНИ СУТКИ
  # Защита от абуза системы извинений
  max_warnings_clear_per_day: 5
  # Требовать ли указания ЦЕЛИ извинения
  # true = в сообщении должен быть ник игрока, перед которым извиняются
  # false = извинение засчитывается без указания цели
  require_target: true
# ============================================
# ПРАВИЛА (основной список)
# ============================================
# Порядок проверки: по убыванию priority
# Чем ВЫШЕ priority, тем РАНЬШЕ проверяется правило
# Если правило сработало, остальные НЕ проверяются
# ============================================
rules:
  # ==========================================
  # НАКАЗАНИЯ (action: punish)
  # ==========================================
  # Тяжёлое оскорбление (бан на 7 дней)
  severe_insult:
    # Включено ли правило
    enabled: true
    # Приоритет проверки (чем выше, тем раньше проверяется)
    # Диапазон: 1-200 (рекомендуется)
    priority: 100
    # Регулярное выражение для поиска
    # (?i) = игнорировать регистр (Заглавные/строчные не важны)
    # | = логическое ИЛИ
    regex: "(?i)(твою мать|твою маму|fuck you|motherfucker)"
    # Тип действия (punish/apology/notify)
    action: "punish"
    # Тип наказания: warn, mute, kick, ban, none
    punishment: "ban"
    # Длительность наказания в тиках
    # 6048000 тиков = 7 дней (6048000 / 20 / 60 / 60 / 24 = 7)
    duration_ticks: 6048000
    # Можно ли снять это наказание через извинение
    # true = игрок может извиниться и варн снимется
    # false = извинения не помогут
    can_be_apologized: true
    # Команды, выполняемые при срабатывании
    # Префиксы:
    #   message! - отправить сообщение игроку
    #   asConsole! - выполнить команду от консоли
    #   broadcast! - сообщение всем игрокам
    #   sound! - проиграть звук (SOUND ГРОМКОСТЬ ВЫСОТА)
    # Переменные:
    #   %player_name% - имя нарушителя
    #   %player_uuid% - UUID нарушителя
    #   %message% - исходное сообщение
    commands:
      - "message! &4&l⛔ &7Тяжелое оскорбление! Бан на 7 дней."
      - "asConsole! ban %player_name% 7d Тяжелое оскорбление - CPA"
  # Средний мат (предупреждение + мут 15 минут)
  medium_swear:
    enabled: true
    priority: 80
    regex: "(?i)(бля|сука|пизд|хуй|fuck|shit|bitch)"
    action: "punish"
    punishment: "warn"
    duration_ticks: 36000  # 30 минут (варн)
    # Дополнительное наказание (выдаётся ВМЕСТЕ с основным)
    additional_punishment: "mute"
    additional_duration_ticks: 18000  # 15 минут (мут)
    can_be_apologized: true
    commands:
      - "message! &c&l⚠ &7Мат! Предупреждение + мут 15 мин."
      - "asConsole! cpa warn %player_name% Нецензурная лексика"
      - "asConsole! mute %player_name% 15m Мат - CPA"
  # Лёгкое оскорбление (только предупреждение)
  light_swear:
    enabled: true
    priority: 60
    regex: "(?i)(дурак|идиот|дебил|тупой|dumb|stupid)"
    action: "punish"
    punishment: "warn"
    duration_ticks: 12000  # 10 минут
    can_be_apologized: true
    commands:
      - "message! &e&l⚠ &7Оскорбление! Предупреждение на 10 мин."
      - "asConsole! cpa warn %player_name% Оскорбление"
  # Расизм/дискриминация (бан на 30 дней, без права извинения)
  racism:
    enabled: true
    priority: 200  # Самый высокий приоритет - проверяется первым
    regex: "(?i)(ниггер|нига|чурка|расист|nigger|faggot)"
    action: "punish"
    punishment: "ban"
    duration_ticks: 2592000  # 30 дней
    # Расизм НЕЛЬЗЯ снять извинением
    can_be_apologized: false
    commands:
      - "message! &4&l⛔ &7Расизм! Бан на 30 дней."
      - "asConsole! ban %player_name% 30d Расизм - CPA"
  # Реклама других серверов (мут 24ч + предупреждение)
  advertising:
    enabled: true
    priority: 90
    # \\. - экранированная точка (именно символ точки, не любой символ)
    regex: "(?i)(заходите|айпи|ip:|play\\.|mc\\.|реклама)"
    action: "punish"
    punishment: "mute"
    duration_ticks: 864000  # 24 часа
    additional_punishment: "warn"
    can_be_apologized: true
    commands:
      - "message! &c&l⛔ &7Реклама! Мут 24ч + предупреждение."

  # ==========================================
  # ИЗВИНЕНИЯ (action: apology)
  # ==========================================
  # Срабатывают на сообщения с извинениями и СНИМАЮТ предупреждения
  # Простое извинение (снимает 1 варн)
  simple_apology:
    enabled: true
    # Низкий приоритет - проверяется после наказаний
    # (чтобы мат не маскировался под извинение)
    priority: 15
    regex: "(?i)(прости|извини|сорри|sorry|виноват)"
    action: "apology"
    # Сколько активных предупреждений снять
    warnings_clear: 1
    # Требовать цель извинения (ник в сообщении)
    require_target: true
    commands:
      - "message! &a&l✔ &7Извинение принято! -1 варн."
      # message_target! - отправить сообщение ЦЕЛИ извинения
      - "message_target! &a&l✔ &f%player_name% &7извинился перед вами!"
  # Глубокое извинение (снимает 2 варна)
  deep_apology:
    enabled: true
    priority: 25  # Выше простого, проверяется раньше
    regex: "(?i)(я был неправ|обещаю|искренне|жалею)"
    action: "apology"
    warnings_clear: 2
    require_target: true
    commands:
      - "message! &a&l✿ &7Глубокое извинение! -2 варна."
  # ==========================================
  # УВЕДОМЛЕНИЯ (action: notify)
  # ==========================================
  # Не наказывают, только предупреждают игрока
  # Чат НЕ блокируется!
  # Спам заглавными буквами (КАПС)
  spam_caps:
    enabled: true
    # Самый низкий приоритет - проверяется последним
    priority: 10
    # Regex: строка из 30+ заглавных букв/пробелов
    # ^ - начало строки
    # [A-ZА-ЯЁ\\s] - заглавные латиница + кириллица + пробел
    # {30,} - 30 и более символов
    # $ - конец строки
    regex: "^[A-ZА-ЯЁ\\s]{30,}$"
    # Только уведомление, без наказания
    action: "notify"
    commands:
      - "message! &e&l⚠ &7Не злоупотребляйте ЗАГЛАВНЫМИ буквами."