# ГЛАВНЫЙ конфигурационный файл плагина
# Здесь настраивается ВСЁ: база данных, отслеживание команд,
# веса нарушений, предупреждения персонала и автоснятие варнов
# ============================================

# ============================================
# РЕЖИМ ОТЛАДКИ
# ============================================
# true = подробные логи в консоль
# false = полная тишина (только ошибки)
debug: false
# ============================================
# БАЗА ДАННЫХ
# ============================================
# Плагин хранит все данные в базе данных
# Поддерживается SQLite (файл) и MySQL (сервер)
# ============================================
database:
  # Тип базы данных: sqlite или mysql
  # sqlite - файл database.db в папке плагина (рекомендуется для небольших серверов)
  # mysql - отдельный сервер MySQL (для крупных серверов и сетей)
  type: "sqlite"
  # Настройки MySQL (используются ТОЛЬКО если type: mysql)
  mysql:
    # Адрес MySQL сервера
    # localhost - если MySQL на том же сервере что и майнкрафт
    # IP-адрес - если MySQL на отдельном сервере
    host: "localhost"
    # Порт MySQL сервера
    # 3306 - стандартный порт MySQL
    port: 3306
    # Название базы данных
    # Будет создана автоматически, если не существует
    database: "cpa"
    # Имя пользователя MySQL
    # root - суперпользователь (НЕ рекомендуется для продакшена)
    # Лучше создать отдельного пользователя с правами только на эту БД
    username: "root"
    # Пароль пользователя MySQL
    # Оставьте пустым, если пароля нет (НЕ рекомендуется)
    password: ""

# ============================================
# ОТСЛЕЖИВАЕМЫЕ КОМАНДЫ МОДЕРАТОРОВ
# ============================================
# Все эти команды ЛОГИРУЮТСЯ когда их использует персонал
# Данные сохраняются в таблицу cpa_staff_actions
# Используется для:
#   - Статистики персонала (/cpa staff)
#   - Расчёта abuse_score
#   - Аудита действий модераторов
# ============================================
tracked_moder_commands:
  - "give"        # Выдача предметов (часто абузят)
  - "gamemode"    # Смена режима игры (себе или другим)
  - "ban"         # Баны (нужно знать кто и за что)
  - "mute"        # Муты (временное затыкание)
  - "kick"        # Кики (выкидывание с сервера)
  - "invsee"      # Просмотр чужих инвентарей (приватность)
  - "tp"          # Телепортация (может использоваться для сталкинга)
  - "fly"         # Режим полёта (нечестное преимущество)
  - "god"         # Режим бога (неуязвимость)
  - "heal"        # Лечение (себя или других)

# ============================================
# ОТСЛЕЖИВАЕМЫЕ КОМАНДЫ ИГРОКОВ
# ============================================
# Команды обычных игроков, которые логируются
# Данные сохраняются в таблицу cpa_command_logs
# Используется для:
#   - Статистики игрока (/cpa stats)
#   - Поиска аномальной активности
# ============================================
tracked_player_commands:
  - "msg"    # Личные сообщения (могут быть жалобы/оскорбления)
  - "tpa"    # Запросы на телепортацию (социальная активность)
  - "home"   # Телепорт домой (частота использования)
  - "spawn"  # Телепорт на спавн
  - "kit"    # Получение наборов (экономическая активность)

# ============================================
# СУПЕР-КОМАНДЫ (ДЕТАЛЬНАЯ ЗАПИСЬ)
# ============================================
# Для этих команд сохраняется РАСШИРЕННАЯ информация в формате JSON
# Обычные команды сохраняют только факт использования
# Супер-команды сохраняют ВСЕ параметры
# ============================================
super_commands:
  # Команда /give
  give:
    # Включить детальное логирование
    track: true
    # Какие поля сохранять в JSON
    fields: 
      - "target"  # Кому выдали предмет
      - "item"    # Какой предмет (например, minecraft:diamond)
      - "amount"  # Сколько штук
      - "world"   # В каком мире
      - "x"       # Координата X
      - "y"       # Координата Y
      - "z"       # Координата Z
  # Команда /gamemode  
  gamemode:
    track: true
    fields:
      - "target"      # Кому меняют режим
      - "old_mode"    # Какой был ДО (survival/creative/adventure/spectator)
      - "new_mode"    # Какой стал ПОСЛЕ
      - "world"
      - "x"
      - "y"
      - "z"

# ============================================
# ЗАПРЕЩЁННЫЕ ПРАВА (PERMISSIONS)
# ============================================
# Права, которые НЕ ДОЛЖНЫ быть у персонала
# При обнаружении такого права у сотрудника:
#   - Записывается в лог
#   - Добавляются очки в abuse_score
#   - Отправляется уведомление владельцу
# ============================================
prohibited_permissions:
  - "minecraft.command.op"  # Право выдавать оператора (критично!)
  - "*"                     # ВСЕ права (суперадмин - только владелец)
  - "luckperms.*"           # Полный доступ к LuckPerms

# ============================================
# ВЕСА ДЛЯ РАСЧЁТА ABUSE_SCORE
# ============================================
# Abuse Score - рейтинг злоупотреблений от 0 до 100
# Каждое подозрительное действие добавляет определённое количество очков
# При достижении порогов (staff_warnings) применяются наказания
# ============================================
abuse_weights:
  # Бан без указания причины (подозрительно)
  # Пример: /ban Player (без причины)
  ban_without_reason: 10
  # Выдача предметов САМОМУ СЕБЕ
  # Пример: /give AllF1RE diamond 64
  self_give_items: 8
  # Смена игрового режима САМОМУ СЕБЕ
  # Пример: /gamemode creative (без указания игрока)
  self_gamemode_change: 3
  # Выдача оператора (кому угодно)
  # Пример: /op Player
  op_self: 20
  # Частые телепорты (более 10 раз за час)
  # Может указывать на сталкинг или избегание проверок
  teleport_spam: 5

# ============================================
# ПРЕДУПРЕЖДЕНИЯ ПЕРСОНАЛА
# ============================================
# Автоматические действия при достижении определённого abuse_score
# Уровни применяются ПОСЛЕДОВАТЕЛЬНО (сначала moderator, потом admin)
# ============================================
staff_warnings:
  # Уровень 1: Модератор (лёгкое предупреждение)
  moderator:
    # Включить этот уровень
    enabled: true
    # Порог срабатывания (abuse_score >= 30)
    # 0-29 = норма, 30-49 = уровень moderator
    threshold: 30
    # Команды, выполняемые при срабатывании
    # %player_name% - ник сотрудника
    # %score% - текущий abuse_score
    commands:
      # Забрать 100 игровой валюты (требуется CMI)
      - "asConsole! cmi money take %player_name% 100"
      # Отправить личное сообщение
      - "message! &c&l⚠ &7Ваш рейтинг злоупотреблений превысил норму!"
  # Уровень 2: Администратор (строгое предупреждение)
  admin:
    enabled: true
    threshold: 50  # 50-69 = уровень admin
    commands:
      # Забрать 500 валюты
      - "asConsole! cmi money take %player_name% 500"
      # Оповестить ВЕСЬ сервер
      - "broadcast! &c&l[CPA] &f%player_name% &7получил строгое предупреждение!"
# ============================================
# АВТОСНЯТИЕ ПРЕДУПРЕЖДЕНИЙ
# ============================================
# Система автоматического снятия варнов при выполнении условий
# Проверяется периодически (check_interval_ticks)
# ============================================
warn_clear:
  # Включить автоснятие
  enabled: true
  # Интервал проверки условий (в тиках)
  # 12000 тиков = 10 минут (12000 / 20 / 60 = 10)
  # Как часто плагин проверяет, нужно ли снять варны
  check_interval_ticks: 12000
  # Список проверок (можно добавить свои)
  checks:
    # Проверка "Хорошее поведение"
    good_behavior:
      # Включить эту проверку
      enabled: true
      # Название проверки (для логов)
      name: "Хорошее поведение"
      # Условие для срабатывания
      # AND = оба условия должны быть true
      # %cpa_player_warnings_count_{player}% > 0 = есть активные варны
      # %cpa_player_time_since_last_violation_{player}% > 86400 = прошло >24 часов с последнего нарушения
      # 86400 секунд = 24 часа (60 * 60 * 24)
      condition: "%cpa_player_warnings_count_{player}% > 0 AND %cpa_player_time_since_last_violation_{player}% > 86400"
      # Команды при срабатывании
      commands:
        # Снять 1 предупреждение
        - "asConsole! cpa warn clear %player_name% 1"
        # Уведомить игрока
        - "message! &a&l✔ &7Снято предупреждение за хорошее поведение!"
# ============================================
# ОБЩИЕ НАСТРОЙКИ ЖАЛОБ
# ============================================
# Детальные настройки жалоб находятся в reports.yml
# Здесь только основные переключатели
# ============================================
reports:
  # Включить систему жалоб
  # Если false - команда /report будет отключена
  enabled: true
  # Кулдаун между жалобами (секунды)
  # 60 = 1 минута между жалобами от одного игрока
  cooldown_seconds: 60
  # Автоочистка старых жалоб (дни)
  # 30 = жалобы старше 30 дней удаляются
  # 0 = не удалять никогда
  cleanup_days: 30
