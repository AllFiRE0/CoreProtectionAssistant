# Chat bot responds to player messages based on specified rules
# Supports all command prefixes: asConsole!, asPlayer!, message!, broadcast!, sound!, title!, actionbar!
# ============================================

# ============================================
# GLOBAL SETTINGS
# ============================================
# Fully enable/disable the bot
# true = bot works, false = bot is disabled
enabled: true
# Debug mode
# true = detailed console logs (every message, rule checks)
# false = complete silence (only critical errors)
debug: false
# Permission to use the bot
# If specified (e.g., "cpa.chatbot.use") - bot only responds to players with this permission
# If empty "" - bot responds to all players
permission_usage: ""
# Global cooldown between ANY bot responses to the same player (in ticks)
# 20 ticks = 1 second
# Spam protection - player cannot spam the bot with questions
global_cooldown_ticks: 20
# Whether the bot ignores itself
# true = bot will not react to its own messages (recursion protection)
# false = bot may respond to itself (dangerous - can cause infinite loop)
ignore_self: true
# Whether to log rule triggers to console
# true = "[ChatBot] Player ... triggered rule ..." is written to console
# false = no logs about triggers
log_triggers: true
# Maximum message length for processing
# Messages longer than this value are ignored
# Protection against spam with huge texts
max_message_length: 256

# ============================================
# EXCLUSIONS
# ============================================
# Whom the bot ignores completely (even if they have permissions)
exclusions:
  # Permissions that cause the bot to ignore the player
  # Example: ["cpa.chatbot.bypass", "cpa.admin"]
  permissions: []
  # Specific players by nickname (case sensitive!)
  # Example: ["AllF1RE", "Notch"]
  players: []
  # LuckPerms groups that the bot ignores
  # Example: ["admin", "moderator"]
  groups: []

# ============================================
# BOT RULES
# ============================================
# Each rule is a separate bot reaction to a message
# Rules are checked in descending order of priority (higher number = checked earlier)
# Only the FIRST matching rule triggers
rules:
  # ------------------------------------------
  # Greeting
  # ------------------------------------------
  greeting:
    # Whether this rule is enabled
    enabled: true
    # Check priority (1-200, higher = checked earlier)
    priority: 100
    # Permission for this specific rule
    # If "" - permission is not checked
    permission: ""
    # Conditions for triggering (if "" - not checked)
    # Supports: ==, !=, >, <, >=, <=, contains, AND, OR, ( )
    # Available placeholders: %player_name%, %player_world%, %player_health%, and any PAPI
    # Example: "%player_health% > 10 AND %player_world% == world"
    conditions: ""
    # Symbol prefix at the beginning of the message
    # If "!" - bot only responds to "!Hello", but not to "Hello"
    # If "" - reacts to any message containing the regex
    symbol: ""
    # Cooldown for this specific rule (in ticks)
    # 40 ticks = 2 seconds
    # 0 = no cooldown
    cooldown_ticks: 40
    # Trigger chance in percent (0-100)
    # 100 = always triggers
    # 50 = triggers with 50% probability
    chance: 100
    # Delay before response (in ticks)
    # 0 = responds immediately
    # 20 = responds after 1 second
    delay_ticks: 0
    # Regular expression to search in the message
    # (?i) - case insensitive
    # | - logical OR
    regex: "(?i)(hello|hi|hey|greetings|howdy|sup|hola)"
    # Main commands executed when triggered
    # Available variables: %player_name%, %player_uuid%, %player_world%, %message%
    # Available prefixes:
    #   message! - send a message to the player
    #   broadcast! - send a message to everyone
    #   asConsole! - execute a command from console
    #   asPlayer! - execute a command as the player
    #   sound! - play a sound (SOUND_NAME VOLUME PITCH)
    #   title! - send a title
    #   actionbar! - send to action bar
    answer_cmds:
      #- "message! &a&lBOT &7» &fHello, %player_name%!"
      - "sound! ENTITY_PLAYER_LEVELUP 1.0 1.5"
    # Random responses (a random one is chosen from the list INSTEAD of answer_cmds)
    # If the list is empty - answer_cmds is always used
    # If the list is not empty - with 50% probability a random response is used from here
    answer_cmds_random:
      - "message! &a&lBOT &7» &fHey there, %player_name%!"
      - "message! &a&lBOT &7» &fWelcome, %player_name%!"
      - "message! &a&lBOT &7» &fHello! Long time no see"

  # ------------------------------------------
  # Help
  # ------------------------------------------
  help:
    enabled: true
    priority: 80
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 100
    chance: 100
    delay_ticks: 0
    regex: "(?i)(help|commands|what can you do)"
    answer_cmds:
      - "message! &a&lBOT &7» &fAvailable commands: &e/cpa help&f, &e/report&f, &e/spawn"
    answer_cmds_random: []

  # ------------------------------------------
  # Mentioning the bot
  # ------------------------------------------
  mention:
    enabled: true
    priority: 95
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 50
    chance: 100
    delay_ticks: 0
    regex: "(?i)(bot|robot)"
    answer_cmds:
      - "message! &a&lBOT &7» &fI'm here! Type &ehelp &ffor a list of commands."
    answer_cmds_random: []
