# Файл локализации — ВСЕ сообщения плагина настраиваются здесь
# Поддерживает коды цветов: &a, &c, &e, &l, &m, &n, &o, &r
# Поддерживает HEX-цвета: &#RRGGBB (например, &#FF5500Привет)
# 
# Доступные языки (меняется только содержимое, ключи не трогать):
#   ru_ru - Русский
#   en_us - Английский
#   de_de - Немецкий (в разработке)
# 
# Чтобы отключить сообщение, укажите "" или "none"
# ============================================

# Код языка (влияет на форматирование дат/чисел)
# ru_ru - 24-часовой формат, точка как разделитель (10.5)
# en_us - 12-часовой формат, точка как разделитель (10.5)
lang: "ru_ru"
# Префикс, добавляемый ко всем сообщениям с %prefix%
# Не убирайте %prefix% из сообщений ниже, иначе префикса не будет
# Можно оставить пустым: prefix: ""
# Можно отключить: prefix: "none"
prefix: "&8[&c&lCPA&8] &7»"

# ============================================
# ОСНОВНЫЕ СООБЩЕНИЯ
# ============================================
messages:
  # ------------------------------------------
  # Общие сообщения
  # ------------------------------------------
  # Отказ в доступе (нет прав)
  no_permission: "%prefix% &cУ вас нет прав."
  # Игрок не найден в базе (никогда не заходил)
  # %player% - ник игрока
  player_not_found: "%prefix% &f%player% &cне найден."
  # Игрок оффлайн
  # %player% - ник игрока
  player_offline: "%prefix% &f%player% &cне в сети."
  # Успешная перезагрузка конфига
  # %time% - время загрузки в миллисекундах
  reload_success: "%prefix% &aКонфигурация перезагружена за &f%time%ms&a."
  # Неизвестная команда
  unknown_command: "%prefix% &cНеизвестная команда. &f/cpa help"
  # Ошибка выполнения команды
  error_executing: "%prefix% &cОшибка выполнения команды."
  grief_possible: "&c[CPA] Possible grief: &f%player% &cbroke &f%block% &cat &f%world% %x% %y% %z%"
  grief_staff_suspected: "&c[CPA] Staff member &f%player% &csuspected of griefing!"
  grief_interact: "&7Player &f%player% &7interacted with &f%block% &7owned by &f%owner%"

  # ------------------------------------------
  # Помощь (/cpa help)
  # ------------------------------------------
  # &m - зачёркнутый текст, &r - сброс форматирования
  help_header: "&8&m-----&r &c&lCoreProtectionAssistant &8&m-----"
  help_stats: "&f/cpa stats <игрок> &7- Статистика игрока"
  help_staff: "&f/cpa staff <игрок> &7- Статистика персонала"
  help_top: "&f/cpa top <тип> &7- Топ игроков"
  help_check: "&f/cpa check <игрок> &7- Быстрая проверка"
  help_warn: "&f/cpa warn <игрок> [причина] &7- Выдать предупреждение"
  help_warn_clear: "&f/cpa warn clear <игрок> <кол-во> &7- Снять"
  help_reload: "&f/cpa reload &7- Перезагрузить конфиг"
  help_report: "&f/cpa report <игрок> <причина> &7- Пожаловаться на игрока"

  # ------------------------------------------
  # Статистика игрока (/cpa stats)
  # ------------------------------------------
  stats_usage: "%prefix% &cИспользование: &f/cpa stats <игрок>"
  # %player% - ник игрока
  stats_header: "&8&m-----&r &cСтатистика: &f%player% &8&m-----"
  # %value% - числовое значение
  stats_blocks_broken: "&7Сломано блоков: &f%value%"
  stats_blocks_placed: "&7Поставлено блоков: &f%value%"
  stats_chests_opened: "&7Открыто контейнеров: &f%value%"
  stats_commands: "&7Команд использовано: &f%value%"
  stats_deaths: "&7Смертей: &f%value%"
  stats_kills: "&7Убийств: &f%value%"
  stats_first_seen: "&7Первый вход: &f%value%"
  stats_last_seen: "&7Последний вход: &f%value%"
  stats_playtime: "&7Наиграно: &f%value%"
  stats_warnings: "&7Предупреждений: &f%value%"
  stats_violations: "&7Нарушений чата: &f%value%"
  stats_apologies: "&7Извинений: &f%value%"
  stats_ratio: "&7Признание ошибок: &f%value%"

  # ------------------------------------------
  # Статистика персонала (/cpa staff)
  # ------------------------------------------
  staff_usage: "%prefix% &cИспользование: &f/cpa staff <игрок>"
  # Доступно только для cpa.staff (владелец)
  staff_header: "&8&m-----&r &cПерсонал: &f%player% &8&m-----"
  staff_bans: "&7Банов выдано: &f%value%"
  staff_mutes: "&7Мутов выдано: &f%value%"
  staff_kicks: "&7Киков: &f%value%"
  staff_gives: "&7Выдач предметов: &f%value%"
  staff_gamemode_changes: "&7Смен режима: &f%value%"
  staff_warnings_count: "&7Предупреждений получено: &f%value%"
  # %value%% - рейтинг от 0 до 100 со знаком процента
  staff_abuse_score: "&7Рейтинг злоупотреблений: %value%"

  # ------------------------------------------
  # Проверка игрока (/cpa check)
  # ------------------------------------------
  check_usage: "%prefix% &cИспользование: &f/cpa check <игрок>"
  check_header: "&8&m-----&r &cПроверка: &f%player% &8&m-----"
  check_online: "&7Статус: &aОнлайн"
  check_offline: "&7Статус: &cОффлайн &7(Последний вход: &f%time%&7)"
  check_warnings: "&7Активных предупреждений: %color%%value%"
  check_violations: "&7Нарушений чата: &f%value%"
  check_apologies: "&7Извинений: &f%value%"
  check_ratio: "&7Признание ошибок: &f%value%"
  check_reports: "&7Жалоб за 24 часа: %color%%value%"
  check_same_ip: "&7Игроков с таким же IP: &f%value%"
  check_same_ip_list: "&7Список: &f%list%"
  check_similar_nicks: "&7Похожих ников: &f%value%"
  check_prohibited_perms: "&7Запрещенные права: &f%value%"

  # ------------------------------------------
  # Топ игроков (/cpa top)
  # ------------------------------------------
  top_usage: "%prefix% &cИспользование: &f/cpa top <тип> [страница]"
  top_invalid_type: "%prefix% &cНеверный тип. Доступно: %types%"
  top_invalid_page: "%prefix% &cНеверный номер страницы"
  top_no_data: "%prefix% &7Нет данных для отображения"
  top_header: "&8&m-----&r &cТоп: &f%type% &8(Стр. %page%) &8&m-----"
  top_format: "&f#%position% &7- &f%player% &8| &7%value%"
  top_types:
    warnings: "Предупреждения"
    reports: "Жалобы"
    blocks_broken: "Сломано блоков"
    blocks_placed: "Поставлено блоков"
    playtime: "Наиграно"
    deaths: "Смерти"
    kills: "Убийства"

  # ------------------------------------------
  # Жалобы (/report)
  # ------------------------------------------
  report_usage: "%prefix% &cИспользование: &f/report <игрок> <причина>"
  report_player_only: "%prefix% &cЭта команда только для игроков"
  report_self: "%prefix% &cНельзя пожаловаться на самого себя"
  # %target% - на кого жалоба
  # %id% - ID жалобы (для отслеживания)
  report_success: "%prefix% &aЖалоба на &f%target% &aотправлена. &7(ID: &f%id%&7)"
  # %seconds% - сколько секунд осталось до следующей жалобы
  report_cooldown: "%prefix% &cЖалобу можно отправлять раз в %seconds% сек."
  report_target_limit: "%prefix% &cНа этого игрока уже много жалоб. Подождите."
  report_disabled: "%prefix% &cСистема жалоб отключена"
  report_failed: "%prefix% &cНе удалось сохранить жалобу"
  report_abuse_warning: "%prefix% &e[!] &cВы часто отправляете ложные жалобы. Будьте внимательнее."
  # %id% - ID жалобы
  # %reporter% - кто пожаловался
  # %target% - на кого
  # %reason% - причина
  report_notify_staff: "%prefix% &e[ЖАЛОБА #%id%] &f%reporter% &7→ &c%target% &8| &7%reason%"

  # ------------------------------------------
  # Предупреждения (/cpa warn)
  # ------------------------------------------
  warn_usage: "%prefix% &cИспользование: &f/cpa warn <игрок> [причина]"
  warn_clear_usage: "%prefix% &cИспользование: &f/cpa warn clear <игрок> <кол-во>"
  warn_list_usage: "%prefix% &cИспользование: &f/cpa warn list <игрок>"
  warn_invalid_amount: "%prefix% &cНеверное количество"
  # %player% - кому выдали
  # %reason% - причина
  warn_success: "%prefix% &aПредупреждение выдано &f%player%&a. &7(%reason%)"
  # %staff% - кто выдал предупреждение
  # %reason% - причина
  warn_notify_target: "%prefix% &cВы получили предупреждение от &f%staff%&c. &7(%reason%)"
  # %amount% - сколько варнов снято
  # %player% - с кого сняли
  warn_clear_success: "%prefix% &aСнято &f%amount% &aпредупреждений с &f%player%&a."
  # %player% - ник игрока
  warn_no_warnings: "%prefix% &7У &f%player% &7нет активных предупреждений"
  warn_list_header: "&8&m-----&r &cПредупреждения: &f%player% &8&m-----"

  # ------------------------------------------
  # Формат времени и слова
  # ------------------------------------------
  # Используются для отображения времени в сообщениях
  time_second: "сек"
  time_minute: "мин"
  time_hour: "ч"
  time_day: "дн"
  time_seconds: "сек"
  time_minutes: "мин"
  time_hours: "ч"
  time_days: "дн"
  # Для значений, которых нет (0 или null)
  time_never: "Никогда"
  # Отсутствие данных
  word_none: "Нет"
  word_unknown: "Неизвестно"
  word_console: "Консоль"
  word_yes: "Да"
  word_no: "Нет"
