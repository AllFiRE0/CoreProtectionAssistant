# ============================================
# CoreProtectionAssistant - ChatBot Configuration
# ============================================
enabled: true
permission_usage: ""
global_cooldown_ticks: 20
ignore_self: true
log_triggers: true
max_message_length: 256

exclusions:
  permissions: []
  players: []
  groups: []

rules:
  greeting:
    enabled: true
    priority: 100
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 40
    chance: 100
    delay_ticks: 0
    regex: "(?i)(привет|здравствуй|хай|hello|hi|ку|прив|здарова)"
    answer_cmds:
      - "message! &a&lБОТ &7» &fПривет, %player_name%!"
      - "sound! ENTITY_PLAYER_LEVELUP 1.0 1.5"
    answer_cmds_random:
      - "message! &a&lБОТ &7» &fЗдарова, %player_name%!"
      - "message! &a&lБОТ &7» &fПриветствую, %player_name%!"

  help:
    enabled: true
    priority: 80
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 100
    chance: 100
    delay_ticks: 0
    regex: "(?i)(помощь|help|команды|хелп)"
    answer_cmds:
      - "message! &a&lБОТ &7» &fДоступные команды: &e/cpa help&f, &e/report&f, &e/spawn"
    answer_cmds_random: []

  mention:
    enabled: true
    priority: 95
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 50
    chance: 100
    delay_ticks: 0
    regex: "(?i)(бот|bot|чатбот)"
    answer_cmds:
      - "message! &a&lБОТ &7» &fЯ здесь! Напиши &eпомощь &fдля списка команд."
    answer_cmds_random: []

  test:
    enabled: true
    priority: 100
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 0
    chance: 100
    delay_ticks: 0
    regex: "(?i)(тест|test|проверка)"
    answer_cmds:
      - "message! &a&lБОТ &7» &fТест пройден! Я работаю, %player_name%!"
    answer_cmds_random: []
