# 效邪褌-斜芯褌 芯褌胁械褔邪械褌 薪邪 褋芯芯斜褖械薪懈褟 懈谐褉芯泻芯胁 锌芯 蟹邪写邪薪薪褘屑 锌褉邪胁懈谢邪屑
# 袩芯写写械褉卸懈胁邪械褌 胁褋械 锌褉械褎懈泻褋褘 泻芯屑邪薪写: asConsole!, asPlayer!, message!, broadcast!, sound!, title!, actionbar!

# ============================================
# 袚袥袨袘袗袥鞋袧蝎袝 袧袗小孝袪袨袡袣袠
# ============================================
# 袩芯谢薪芯褋褌褜褞 胁泻谢褞褔懈褌褜/胁褘泻谢褞褔懈褌褜 斜芯褌邪
enabled: false
# 袩褉邪胁芯 薪邪 懈褋锌芯谢褜蟹芯胁邪薪懈械 斜芯褌邪 (械褋谢懈 锌褍褋褌芯 "" - 斜芯褌 芯褌胁械褔邪械褌 胁褋械屑)
permission_usage: "cpa.chatbot.use"
# 袚谢芯斜邪谢褜薪褘泄 泻褍谢写邪褍薪 屑械卸写褍 袥挟袘蝎袦袠 芯褌胁械褌邪屑懈 斜芯褌邪 芯写薪芯屑褍 懈谐褉芯泻褍 (胁 褌懈泻邪褏)
# 120 褌懈泻芯胁 = 6 褋械泻褍薪写
global_cooldown_ticks: 120
# 袠谐薪芯褉懈褉芯胁邪褌褜 谢懈 斜芯褌褍 褋邪屑芯谐芯 褋械斜褟 (褔褌芯斜褘 薪械 斜褘谢芯 褉械泻褍褉褋懈懈)
ignore_self: true
# 袥芯谐懈褉芯胁邪褌褜 谢懈 褋褉邪斜邪褌褘胁邪薪懈褟 斜芯褌邪 胁 泻芯薪褋芯谢褜
log_triggers: true
# 袦邪泻褋懈屑邪谢褜薪邪褟 写谢懈薪邪 褋芯芯斜褖械薪懈褟 写谢褟 芯斜褉邪斜芯褌泻懈 (斜芯谢褜褕懈械 褋芯芯斜褖械薪懈褟 懈谐薪芯褉懈褉褍褞褌褋褟)
max_message_length: 256

# ============================================
# 袠小袣袥挟效袝袧袠携
# ============================================
# 袣芯谐芯 斜芯褌 懈谐薪芯褉懈褉褍械褌 锌芯谢薪芯褋褌褜褞
exclusions:
  # 袩褉邪胁邪, 锌褉懈 薪邪谢懈褔懈懈 泻芯褌芯褉褘褏 斜芯褌 懈谐薪芯褉懈褉褍械褌 懈谐褉芯泻邪
  permissions:
    - "cpa.chatbot.bypass"
  # 袣芯薪泻褉械褌薪褘械 懈谐褉芯泻懈 锌芯 薪懈泻褍
  players: []
  # 袚褉褍锌锌褘 LuckPerms
  groups: []

# ============================================
# 袩袪袗袙袠袥袗 袘袨孝袗
# ============================================

rules:
  # ------------------------------------------
  # 袩褉懈胁械褌褋褌胁懈械
  # ------------------------------------------
  greeting:
    enabled: true
    priority: 100
    permission: ""
    conditions: ""
    symbol: "!"
    cooldown_ticks: 40
    chance: 100
    delay_ticks: 0
    regex: "(?i)^(锌褉懈胁械褌|蟹写褉邪胁褋褌胁褍泄|褏邪泄|hello|hi|privet|zdarova|泻褍|锌褉懈胁|蟹写邪褉芯胁邪)"
    answer_cmds:
      - "message! &a&l袘袨孝 &7禄 &f袩褉懈胁械褌, %player_name%! 袛芯斜褉芯 锌芯卸邪谢芯胁邪褌褜 薪邪 褋械褉胁械褉!"
      - "sound! ENTITY_PLAYER_LEVELUP 1.0 1.5"
      - "asConsole! give %player_name% minecraft:bread 1"
    answer_cmds_random:
      - "message! &a&l袘袨孝 &7禄 &f袟写邪褉芯胁邪, %player_name%!"
      - "message! &a&l袘袨孝 &7禄 &f袩褉懈胁械褌褋褌胁褍褞 褌械斜褟, %player_name%!"

  # ------------------------------------------
  # 袩褉芯褖邪薪懈械
  # ------------------------------------------
  farewell:
    enabled: true
    priority: 90
    permission: ""
    conditions: ""
    symbol: "!"
    cooldown_ticks: 40
    chance: 100
    delay_ticks: 0
    regex: "(?i)^(锌芯泻邪|写芯 褋胁懈写邪薪懈褟|斜邪泄|bye|goodbye|褍褏芯卸褍|胁褋械屑 锌芯泻邪)"
    answer_cmds:
      - "message! &a&l袘袨孝 &7禄 &f袛芯 胁褋褌褉械褔懈, %player_name%! 袟邪褏芯写懈 械褖褢!"
      - "sound! ENTITY_VILLAGER_YES 1.0 1.0"

  # ------------------------------------------
  # 袩芯屑芯褖褜
  # ------------------------------------------
  help:
    enabled: true
    priority: 80
    permission: ""
    conditions: ""
    symbol: "!"
    cooldown_ticks: 100
    chance: 100
    delay_ticks: 0
    regex: "(?i)^(锌芯屑芯褖褜|help|泻芯屑邪薪写褘|褏械谢锌|锌芯屑芯谐懈褌械|褔褌芯 写械谢邪褌褜)"
    answer_cmds:
      - "message! &a&l袘袨孝 &7禄 &f袛芯褋褌褍锌薪褘械 泻芯屑邪薪写褘: &e/cpa help&f, &e/report&f, &e/kit&f, &e/spawn"
      - "message! &a&l袘袨孝 &7禄 &f袝褋谢懈 薪褍卸薪邪 锌芯屑芯褖褜 屑芯写械褉邪褌芯褉邪 - 懈褋锌芯谢褜蟹褍泄 &e/report <薪懈泻> <锌褉懈褔懈薪邪>"

  # ------------------------------------------
  # 袩褉邪胁懈谢邪 褋械褉胁械褉邪
  # ------------------------------------------
  rules_info:
    enabled: true
    priority: 70
    permission: ""
    conditions: ""
    symbol: "!"
    cooldown_ticks: 200
    chance: 100
    delay_ticks: 0
    regex: "(?i)^(锌褉邪胁懈谢邪|rules|锌褉邪胁懈谢芯|蟹邪泻芯薪褘)"
    answer_cmds:
      - "message! &a&l袘袨孝 &7禄 &f袩褉邪胁懈谢邪 褋械褉胁械褉邪:"
      - "message! &7  1. 袧械 屑邪褌械褉懈褌褜褋褟"
      - "message! &7  2. 袧械 谐褉懈褎械褉懈褌褜"
      - "message! &7  3. 校胁邪卸邪褌褜 写褉褍谐懈褏 懈谐褉芯泻芯胁"
      - "message! &7  4. 袧械 懈褋锌芯谢褜蟹芯胁邪褌褜 褔懈褌褘"

  # ------------------------------------------
