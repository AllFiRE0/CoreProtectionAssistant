    answer_cmds_random:
      - "message! &a&l袘袨孝 &7禄 &f袩芯谐芯写邪 胁 屑懈褉械 %player_world% 褋泻芯褉芯 懈蟹屑械薪懈褌褋褟!"
      - "message! &a&l袘袨孝 &7禄 &f袧邪写械褞褋褜, 褌械斜械 薪褉邪胁懈褌褋褟 锌芯谐芯写邪, %player_name%!"
