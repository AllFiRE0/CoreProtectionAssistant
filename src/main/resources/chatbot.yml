# Чат-бот отвечает на сообщения игроков по заданным правилам
# Поддерживает все префиксы команд: asConsole!, asPlayer!, message!, broadcast!, sound!, title!, actionbar!
# ============================================

# ============================================
# ГЛОБАЛЬНЫЕ НАСТРОЙКИ
# ============================================
# Полностью включить/выключить бота
# true = бот работает, false = бот отключен
enabled: true
# Режим отладки
# true = подробные логи в консоль (каждое сообщение, проверка правил)
# false = полная тишина (только критические ошибки)
debug: false
# Право на использование бота
# Если указано (например "cpa.chatbot.use") - бот отвечает только игрокам с этим правом
# Если пусто "" - бот отвечает всем игрокам
permission_usage: ""
# Глобальный кулдаун между ЛЮБЫМИ ответами бота одному игроку (в тиках)
# 20 тиков = 1 секунда
# Защита от спама - игрок не может заспамить бота вопросами
global_cooldown_ticks: 20
# Игнорировать ли боту самого себя
# true = бот не будет реагировать на свои собственные сообщения (защита от рекурсии)
# false = бот может отвечать сам себе (опасно - может вызвать бесконечный цикл)
ignore_self: true
# Логировать ли срабатывания правил в консоль
# true = в консоль пишется "[ChatBot] Player ... triggered rule ..."
# false = никаких логов о срабатываниях
log_triggers: true
# Максимальная длина сообщения для обработки
# Сообщения длиннее этого значения игнорируются
# Защита от спама огромными текстами
max_message_length: 256

# ============================================
# ИСКЛЮЧЕНИЯ
# ============================================
# Кого бот игнорирует полностью (даже если у них есть права)
exclusions:
  # Права, при наличии которых бот игнорирует игрока
  # Пример: ["cpa.chatbot.bypass", "cpa.admin"]
  permissions: []
  # Конкретные игроки по нику (регистр важен!)
  # Пример: ["AllF1RE", "Notch"]
  players: []
  # Группы LuckPerms, которые бот игнорирует
  # Пример: ["admin", "moderator"]
  groups: []

# ============================================
# ПРАВИЛА БОТА
# ============================================
# Каждое правило - отдельная реакция бота на сообщение
# Правила проверяются по убыванию priority (чем выше число - тем раньше проверка)
# Срабатывает только ПЕРВОЕ подходящее правило
rules:
  # ------------------------------------------
  # Приветствие
  # ------------------------------------------
  greeting:
    # Включено ли это правило
    enabled: true
    # Приоритет проверки (1-200, чем выше - тем раньше проверяется)
    priority: 100
    # Право для этого конкретного правила
    # Если "" - право не проверяется
    permission: ""
    # Условия для срабатывания (если "" - не проверяется)
    # Поддерживаются: ==, !=, >, <, >=, <=, contains, AND, OR, ( )
    # Доступные плейсхолдеры: %player_name%, %player_world%, %player_health%, и любые PAPI
    # Пример: "%player_health% > 10 AND %player_world% == world"
    conditions: ""
    # Символ-префикс в начале сообщения
    # Если "!" - бот отвечает только на "!Привет", но не на "Привет"
    # Если "" - реагирует на любое сообщение, содержащее regex
    symbol: ""
    # Кулдаун для этого конкретного правила (в тиках)
    # 40 тиков = 2 секунды
    # 0 = без кулдауна
    cooldown_ticks: 40
    # Шанс срабатывания в процентах (0-100)
    # 100 = срабатывает всегда
    # 50 = срабатывает с вероятностью 50%
    chance: 100
    # Задержка перед ответом (в тиках)
    # 0 = отвечает сразу
    # 20 = отвечает через 1 секунду
    delay_ticks: 0
    # Регулярное выражение для поиска в сообщении
    # (?i) - игнорировать регистр (Привет, ПРИВЕТ, прИвЕт - всё сработает)
    # | - логическое ИЛИ
    regex: "(?i)(привет|пр|прив|ку|здаров|превет|прiвет|здравствуй|хай|hello|hi|ку|прив|здарова)"
    # Основные команды, выполняемые при срабатывании
    # Доступные переменные: %player_name%, %player_uuid%, %player_world%, %message%
    # Доступные префиксы:
    #   message! - отправить сообщение игроку
    #   broadcast! - отправить сообщение всем
    #   asConsole! - выполнить команду от консоли
    #   asPlayer! - выполнить команду от имени игрока
    #   sound! - проиграть звук (НАЗВАНИЕ ГРОМКОСТЬ ВЫСОТА)
    #   title! - отправить заголовок
    #   actionbar! - отправить в action bar
    answer_cmds:
      - "message! &a&lБОТ &7» &fПривет, %player_name%!"
      - "sound! ENTITY_PLAYER_LEVELUP 1.0 1.5"
    # Случайные ответы (выбирается случайный из списка ВМЕСТО answer_cmds)
    # Если список пуст - всегда используется answer_cmds
    # Если список не пуст - с вероятностью 50% используется случайный ответ отсюда
    answer_cmds_random:
      - "message! &a&lБОТ &7» &fЗдарова, %player_name%!"
      - "message! &a&lБОТ &7» &fПриветствую, %player_name%!"

  # ------------------------------------------
  # Помощь
  # ------------------------------------------
  help:
    enabled: true
    priority: 80
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 100
    chance: 100
    delay_ticks: 0
    regex: "(?i)(помощь|help|команды|хелп|помогите)"
    answer_cmds:
      - "message! &a&lБОТ &7» &fДоступные команды: &e/cpa help&f, &e/report&f, &e/spawn"
    answer_cmds_random: []

  # ------------------------------------------
  # Упоминание бота
  # ------------------------------------------
  mention:
    enabled: true
    priority: 95
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 50
    chance: 100
    delay_ticks: 0
    regex: "(?i)(бот|bot|чатбот)"
    answer_cmds:
      - "message! &a&lБОТ &7» &fЯ здесь! Напиши &eпомощь &fдля списка команд."
    answer_cmds_random: []
