    enabled: true
    priority: 50
    permission: ""
    conditions: ""
    symbol: ""
    cooldown_ticks: 60
    chance: 100
    delay_ticks: 0
    regex: "(?i)(褋锌邪褋懈斜芯|斜谢邪谐芯写邪褉褞|褋锌褋|thanks|thx|thank you|褋褟斜)"
