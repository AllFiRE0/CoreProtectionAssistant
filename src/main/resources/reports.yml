# CoreProtectionAssistant - Reports Configuration
# Author: AllF1RE

reports:
  enabled: true
  cooldown_seconds: 60
  min_playtime_hours: 1
  max_reports_per_player_per_hour: 5
  max_reports_per_target_per_hour: 10
  report_abuse_threshold: 8
  notify_staff: true
  cleanup_days: 30

categories:
  griefing:
    regex: "(?i)(–≥—А–Є—Д–µ—А|—Б–ї–Њ–Љ–∞–ї|—А–∞–Ј—А—Г—И–Є–ї|—Г–Ї—А–∞–ї|grief|–≤–Њ—А—Г–µ—В)"
    weight: 3
    description: "–У—А–Є—Д–µ—А—Б—В–≤–Њ / –Ъ—А–∞–ґ–∞"
    color: "&c"
    
  cheating:
    regex: "(?i)(—З–Є—В—Л|—З–Є—В–µ—А|cheat|hack|–Ї–Є–ї–ї–∞—Г—А–∞|killaura|—Д–ї–∞–є|xray)"
    weight: 5
    description: "–І–Є—В–µ—А—Б—В–≤–Њ"
    color: "&4"
    
  offensive_language:
    regex: "(?i)(–Љ–∞—В|–Њ—Б–Ї–Њ—А–±|—В–Њ–Ї—Б–Є–Ї|–≥—А—Г–±–Є—В|rude|toxic)"
    weight: 2
    description: "–Ю—Б–Ї–Њ—А–±–ї–µ–љ–Є—П"
    color: "&e"
    
  spam_flood:
    regex: "(?i)(—Б–њ–∞–Љ|—Д–ї—Г–і|—Б–њ–∞–Љ–Є—В|—Д–ї—Г–і–Є—В|spam|flood)"
    weight: 1
    description: "–°–њ–∞–Љ / –§–ї—Г–і"
    color: "&6"
    
  trolling:
    regex: "(?i)(—В—А–Њ–ї–ї|–Љ–µ—И–∞–µ—В|–±–µ—Б–Є—В|troll)"
    weight: 2
    description: "–Ґ—А–Њ–ї–ї–Є–љ–≥"
    color: "&d"
    
  other:
    regex: ".*"
    weight: 1
    description: "–Ф—А—Г–≥–Њ–µ"
    color: "&7"

violator_analysis:
  enabled: true
  min_playtime_hours: 5
  max_warnings_threshold: 3
  max_reports_threshold: 5
  actions:
    auto_warn:
      enabled: true
      threshold: 3
      commands:
        - "asConsole! cpa warn %target% –Ь–љ–Њ–≥–Њ –ґ–∞–ї–Њ–± –Њ—В –Є–≥—А–Њ–Ї–Њ–≤"
        - "broadcast! &c[CPA] &f%target% &7–њ–Њ–ї—Г—З–Є–ї –њ—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є–µ –Є–Ј-–Ј–∞ –ґ–∞–ї–Њ–±!"

anti_abuse:
  enabled: true
  actions:
    warn_reporter:
      enabled: true
      threshold: 5
      commands:
        - "message! &c–Т—Л –Њ—В–њ—А–∞–≤–ї—П–µ—В–µ —Б–ї–Є—И–Ї–Њ–Љ –Љ–љ–Њ–≥–Њ –ґ–∞–ї–Њ–±!"
        - "asConsole! cpa warn %reporter% –°–њ–∞–Љ –ґ–∞–ї–Њ–±–∞–Љ–Є"
