# Этот файл управляет ВСЕЙ системой жалоб:
# - Лимиты и кулдауны для игроков
# - Категории жалоб с автоопределением по regex
# - Автоматический анализ нарушителей
# - Защита от абуза (ложные жалобы)
# ============================================

# ============================================
# ОСНОВНЫЕ НАСТРОЙКИ ЖАЛОБ
# ============================================
reports:
  # Включить/выключить ВСЮ систему жалоб
  # true - команда /report работает
  # false - команда /report отключена
  enabled: true
  # Кулдаун между жалобами от ОДНОГО игрока (в секундах)
  # 60 = 1 минута между жалобами
  # Защита от спама жалобами
  cooldown_seconds: 60
  # Минимальное время игры для подачи жалобы (в часах)
  # 1 = игрок должен наиграть хотя бы 1 час
  # Защита от твинков/ботов, которые создаются только для жалоб
  # Работает только если установлен CMI (берёт playtime оттуда)
  min_playtime_hours: 1
  # Максимальное количество жалоб, которое ОДИН игрок может отправить за час
  # 5 = не более 5 жалоб в час
  # При превышении - жалоба отклоняется
  max_reports_per_player_per_hour: 5
  # Максимальное количество жалоб на ОДНОГО игрока за час
  # 10 = если на игрока уже пожаловались 10 раз за час, новые жалобы отклоняются
  # Защита от массовых жалоб на невиновного (рейд жалобами)
  max_reports_per_target_per_hour: 10
  # Порог для определения АБУЗА жалобами
  # 8 = если игрок отправил 8+ жалоб за час, система считает это абузом
  # При достижении срабатывают действия из секции anti_abuse
  report_abuse_threshold: 8
  # Уведомлять ли персонал о новых жалобах
  # true = все с правом cpa.report.see увидят сообщение
  # false = только логирование в базу
  notify_staff: true
  # Автоматическая очистка старых жалоб (в днях)
  # 30 = жалобы старше 30 дней удаляются из базы
  # Экономит место в базе данных
  # 0 = не удалять никогда
  cleanup_days: 30

# ============================================
# КАТЕГОРИИ ЖАЛОБ
# ============================================
# Категории определяются АВТОМАТИЧЕСКИ по тексту жалобы
# Порядок проверки: как в файле (сверху вниз)
# Если не подошла ни одна - используется "other"
# ============================================
categories:
  # Гриферство / кража
  griefing:
    # Регулярное выражение для автоопределения категории
    # (?i) = игнорировать регистр (Заглавные/строчные)
    # | = логическое ИЛИ
    regex: "(?i)(грифер|сломал|разрушил|украл|grief|ворует)"
    # Вес нарушения (используется при анализе нарушителя)
    # 1 = лёгкое, 3 = среднее, 5 = тяжёлое
    # Чем выше вес, тем быстрее игрок получит автоматическое наказание
    weight: 3
    # Человеческое описание категории (для логов и уведомлений)
    description: "Гриферство / Кража"
    # Цвет категории в уведомлениях (коды &a, &c, &e, и т.д.)
    color: "&c"
  # Читерство (читы, хаки)
  cheating:
    regex: "(?i)(читы|читер|cheat|hack|киллаура|killaura|флай|xray)"
    weight: 5  # Самый высокий вес - моментальная реакция
    description: "Читерство"
    color: "&4"
  # Оскорбления / токсичность
  offensive_language:
    regex: "(?i)(мат|оскорб|токсик|грубит|rude|toxic)"
    weight: 2
    description: "Оскорбления"
    color: "&e"
  # Спам / флуд
  spam_flood:
    regex: "(?i)(спам|флуд|спамит|флудит|spam|flood)"
    weight: 1  # Низкий вес - не критично
    description: "Спам / Флуд"
    color: "&6"
  # Троллинг
  trolling:
    regex: "(?i)(тролл|мешает|бесит|troll)"
    weight: 2
    description: "Троллинг"
    color: "&d"
  # Другое (если не подошла ни одна категория)
  other:
    regex: ".*"  # Подходит под ЛЮБОЙ текст
    weight: 1
    description: "Другое"
    color: "&7"
# ============================================
# АНАЛИЗ НАРУШИТЕЛЯ
# ============================================
# Автоматически определяет, заслуживает ли игрок наказания
# на основе: наигранного времени, варнов, количества жалоб
# ============================================
violator_analysis:
  # Включить автоматический анализ нарушителей
  enabled: true
  # Минимальное время игры для анализа (в часах)
  # 5 = анализируются только игроки, наигравшие 5+ часов
  # Новички не наказываются автоматически (могут быть жертвами буллинга)
  min_playtime_hours: 5
  # Максимальное количество АКТИВНЫХ предупреждений
  # 3 = если у игрока 3+ варна, он считается нарушителем
  max_warnings_threshold: 3
  # Максимальное количество жалоб за 24 часа
  # 5 = если 5+ жалоб за сутки, игрок считается нарушителем
  max_reports_threshold: 5
  # Действия при превышении порогов
  actions:
    # Автоматическая выдача предупреждения
    auto_warn:
      enabled: true
      # При каком количестве жалоб выдавать варн
      # 3 = при 3+ жалобах за 24 часа
      threshold: 3
      # Команды при срабатывании
      # %target% - ник нарушителя
      commands:
        - "asConsole! cpa warn %target% Много жалоб от игроков"
        - "broadcast! &c[CPA] &f%target% &7получил предупреждение из-за жалоб!"

# ============================================
# ЗАЩИТА ОТ АБУЗА ЖАЛОБ
# ============================================
# Наказание для тех, кто спамит ЛОЖНЫМИ жалобами
# ============================================
anti_abuse:
  # Включить защиту от абуза
  enabled: true
  # Действия при обнаружении абуза
  actions:
    # Предупреждение для спамера жалоб
    warn_reporter:
      enabled: true
      # При каком количестве жалоб за час выдавать варн
      # 5 = при 5+ жалобах за час
      threshold: 5
      # %reporter% - ник того, кто спамит жалобами
      commands:
        - "message! &cВы отправляете слишком много жалоб!"
        - "asConsole! cpa warn %reporter% Спам жалобами"